#不同机器对插件效果的吸收效率 (1.0 代表 100%)。
#举例如下：如果设为 0.5，则插件提供的能力和带来的额外耗电都会直接减半。
[Utilization]

	[Utilization.SAG_MILL]
		# Default: 1.0
		# Range: 0.0 ~ 100.0
		stackUtilization = 1.0
		# Default: 1.0
		# Range: 0.0 ~ 100.0
		batchUtilization = 1.0

	[Utilization.ALLOY_SMELTER]
		# Default: 3.0
		# Range: 0.0 ~ 100.0
		stackUtilization = 3.0
		# Default: 1.0
		# Range: 0.0 ~ 100.0
		batchUtilization = 1.0

