#机器升级插件相关设置
[Upgrades]

	[Upgrades.basic_batch_upgrade]
		#加成数值 (如增加并行处理数量、增加槽位堆叠容量)。
		# Default: 0.5
		# Range: 0.0 ~ 10000.0
		value = 0.5
		#单台机器能放入的这种插件的最大数量。
		# Default: 16
		# Range: 1 ~ 64
		maxLimit = 16
		#每放入一个插件，机器增加的额外耗电比例 (如 0.05 代表增加 5% 耗电)。
		# Default: 0.05000000074505806
		# Range: 0.0 ~ 100.0
		energyPenalty = 0.05000000074505806

	[Upgrades.crystalline_batch_upgrade]
		#加成数值 (如增加并行处理数量、增加槽位堆叠容量)。
