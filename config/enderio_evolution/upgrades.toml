		value = 2.0
		#单台机器能放入的这种插件的最大数量。
		# Default: 8
		# Range: 1 ~ 64
		maxLimit = 8
		#每放入一个插件，机器增加的额外耗电比例 (如 0.05 代表增加 5% 耗电)。
		# Default: 0.10000000149011612
		# Range: 0.0 ~ 100.0
